<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign Up & Login Page</title>
</head>
<body class="bg-black flex flex-row justify-center font-mono mt-[50px] md:m-[150px]">
    <section class="flex flex-col items-center justify-center gap-12 bg-gray-900 md:flex-row">
        <div class="w-[480px] h-[300px] overflow-hidden w-1/2 md:w-[3/4] h-full">
            <img class="rounded w-full h-[300px] md:h-full" src="https://i.pinimg.com/originals/24/3f/89/243f89252a505b0e446f89403976a70f.gif">
        </div>
        <div class="flex flex-col items-center p-10">
            <h1 class="text-4xl text-white mb-8">Welcome to Our Platform</h1>
            <div class="flex flex-row border-2 border-gray-700 p-6 rounded-lg">
                <div class="rounded-lg">
                    <h1 class="text-green-600 mb-5 text-2xl">Enter your credentials</h1>
                    <input id="usernameBtn" type="text" placeholder="Username" required class="mb-4 p-2 border border-green-500 w-full bg-black text-green-500 hover:border-gray-300">
                    <input id="emailBtn" type="email" placeholder="Email" required class="mb-4 p-2 border border-green-500 w-full bg-black text-green-500 hover:border-gray-300">
                    <div class="relative">
                        <input id="passwordBtn" type="password" placeholder="Password" required class="mb-4 p-2 border border-green-500 w-full bg-black text-green-500 hover:border-gray-300">
                        <button  onclick="togglePasswordVisibility()" class="absolute right-2 top-2 text-green-500"><span class="material-symbols-outlined" id="pass-eye"></span></button>
                    </div>
                    <p id="message" class="text-xl font-bold text-green-500 mb-4"></p>
                    <button onclick="SignUpCTA()" class="bg-green-700 text-white px-4 py-2 mb-4 w-full border-green-500 hover:bg-gray-700 hover:text-green-500 transition duration-300">Sign Up</button>
                    <button onclick="LogInCTA()" class="bg-green-700 text-white px-4 py-2 w-full border-green-500 hover:bg-gray-700 hover:text-green-500 transition duration-300">Log In</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        let mockDatabase = [
            {
            username: "Saket",
            email: "saket@gmail.com",
            password: "password123"
            },
            {
            username: "Rithvik",
            email: "rithvik@gmail.com",
            password: "password321"
            }
        ];

        let username = document.getElementById("usernameBtn");
        let email = document.getElementById("emailBtn");
        let password = document.getElementById("passwordBtn");
        let message = document.getElementById("message");
        let toggleEye = document.getElementById("pass-eye");


        toggleEye.textContent = `visibility_off`;

        console.log(toggleEye);


        function SignUpCTA() {
            const username = document.getElementById("usernameBtn").value;
            const email = document.getElementById("emailBtn").value;
            const password = document.getElementById("passwordBtn").value;

            for (let i = 0; i < mockDatabase.length; i++) {
                if (mockDatabase[i].username == username || mockDatabase[i].email == email) {
                    message.style.color = "red";
                    message.textContent = "⚠️ Username or Email already exists.";
                    return;
                }
            }

            if (username && email && password) {
                mockDatabase.push({ username, email, password });
                message.style.color = "green";
                message.textContent = "✔️ Sign Up Successful!";
                console.log(mockDatabase);
                usernameBtn.value = "";
                emailBtn.value = "";
                passwordBtn.value = "";
            } else {
                message.style.color = "red";
                message.textContent = "⚠️ Please fill in all fields.";
            }
        };

        function LogInCTA() {
            const username = document.getElementById("usernameBtn").value;
            const password = document.getElementById("passwordBtn").value;
            const email = document.getElementById("emailBtn").value;

            for (let i = 0; i < mockDatabase.length; i++) {
                if (mockDatabase[i].username == username && mockDatabase[i].email == email && mockDatabase[i].password == password) {
                    message.style.color = "green";
                    message.textContent = "✔️ Log In Successful!";

                    usernameBtn.value = "";
                    emailBtn.value = "";
                    passwordBtn.value = "";

                    return;
                } else if (mockDatabase[i].username == username && mockDatabase[i].email == email) {
                    message.style.color = "red";
                    message.textContent = "⚠️ Incorrect password.";
                    return;
                } else if (mockDatabase[i].username == username && mockDatabase[i].password == password) {
                    message.style.color = "red";
                    message.textContent = "⚠️ Incorrect email.";
                    return;
                } else if (mockDatabase[i].email == email && mockDatabase[i].password == password) {
                    message.style.color = "red";
                    message.textContent = "⚠️ Incorrect username.";
                    return;
                }
            }

            message.style.color = "red";
            message.textContent = "⚠️ Invalid credentials.";
        };

        function togglePasswordVisibility() {
            if (password.type === "password") {
                password.type = "text";
                toggleEye.textContent = `visibility`;
            } else {
                password.type = "password";
                toggleEye.textContent = `visibility_off`;
            }
        }
    </script>
</body>
</html>
